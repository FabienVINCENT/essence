<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pom — Carburant au meilleur prix</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #e5e5e5;
    --text-muted: #888;
    --accent: #22c55e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ─── Layout container ─── */
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px;
  }

  @media (min-width: 640px) {
    .container { max-width: 600px; }
  }

  /* ─── Header ─── */
  header {
    padding: 20px 16px 12px;
    text-align: center;
  }
  header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ─── Sticky filter bar ─── */
  .filter-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .filter-bar .container {
    display: flex;
    gap: 8px;
    padding: 0;
  }
  .filter-bar select,
  .filter-bar input[type="number"] {
    flex: 1;
    min-width: 0;
    padding: 8px 12px;
    background: #222;
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .filter-bar select:focus,
  .filter-bar input:focus {
    border-color: var(--accent);
  }

  /* ─── Status ─── */
  .status-bar {
    text-align: center;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .status-bar.error { color: #ef4444; }
  .status-bar .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Hero card (best price) ─── */
  .hero-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .hero-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .hero-price {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 8px;
  }
  .hero-station-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .station-logo {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    object-fit: contain;
    background: #fff;
    padding: 2px;
    flex-shrink: 0;
  }
  .station-logo-sm {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    object-fit: contain;
    background: #fff;
    padding: 2px;
    flex-shrink: 0;
  }
  .hero-station {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0;
  }
  .hero-meta {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .hero-cost {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .hero-trip-cost {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .hero-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    background: var(--accent);
    color: #000;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .hero-btn:hover { opacity: 0.9; }

  /* ─── Station list ─── */
  .station-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 20px;
  }

  .station-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .station-card:hover {
    border-color: #444;
  }
  .station-row-1 {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }
  .station-price {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .station-full-cost {
    font-size: 13px;
    color: var(--text-muted);
  }
  .station-row-2 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }
  .station-name-group {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .station-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .station-distance {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .station-address {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ─── Map toggle ─── */
  .map-toggle-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s;
    margin-bottom: 12px;
  }
  .map-toggle-btn:hover {
    border-color: #444;
  }
  #map-wrapper {
    margin-bottom: 16px;
    display: none;
  }
  #map {
    height: 300px;
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    z-index: 1;
  }

  /* ─── Footer ─── */
  footer {
    text-align: center;
    padding: 24px 16px 32px;
    font-size: 12px;
    color: var(--text-muted);
  }
  footer p + p { margin-top: 4px; }

  /* ─── Empty / Startup ─── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state svg {
    width: 56px; height: 56px;
    stroke: #444;
    margin-bottom: 16px;
  }
  .empty-state h3 {
    font-size: 16px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .locate-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    background: var(--accent);
    color: #000;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    margin-top: 20px;
  }
  .locate-btn:hover { opacity: 0.9; transform: scale(1.03); }
  .locate-btn:active { transform: scale(0.97); }
  .locate-btn svg { width: 18px; height: 18px; }

  /* ─── Leaflet overrides ─── */
  .leaflet-popup-content-wrapper {
    background: var(--card) !important;
    color: var(--text) !important;
    border-radius: 8px !important;
    border: 1px solid var(--border) !important;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4) !important;
  }
  .leaflet-popup-tip { background: var(--card) !important; }
  .leaflet-popup-content { font-family: system-ui, sans-serif; font-size: 13px; }

  .price-tag { overflow: visible !important; }

  /* Dark map tiles */
  .leaflet-tile-pane { filter: brightness(0.85) contrast(1.1) saturate(0.7); }

  /* ─── Desktop: 2-col grid for station cards ─── */
  @media (min-width: 640px) {
    .station-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
  }
</style>
</head>
<body>

<header>
  <h1>Pom</h1>
  <p>Carburant au meilleur prix</p>
</header>

<div class="filter-bar" id="filter-bar" style="display:none;">
  <div class="container">
    <select id="fuel-select">
      <option value="e10">E10</option>
      <option value="sp95">SP95</option>
      <option value="sp98">SP98</option>
      <option value="gazole">Gazole</option>
      <option value="e85">E85</option>
    </select>
    <select id="radius-select">
      <option value="5">5 km</option>
      <option value="10" selected>10 km</option>
      <option value="15">15 km</option>
      <option value="20">20 km</option>
      <option value="30">30 km</option>
    </select>
    <input type="number" id="conso-input" value="6.5" min="1" max="30" step="0.1" placeholder="L/100km">
  </div>
</div>

<div class="status-bar" id="status" style="display:none;"></div>

<div id="content">
  <div class="empty-state" id="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7Z"/>
      <circle cx="12" cy="9" r="2.5"/>
    </svg>
    <h3>Trouvez les stations autour de vous</h3>
    <p>Localisez-vous pour découvrir les meilleurs prix</p>
    <button class="locate-btn" id="locate-btn" onclick="startLocate()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/>
      </svg>
      Me géolocaliser
    </button>
  </div>
</div>

<div class="container" id="results-container" style="display:none;">
  <div id="hero"></div>
  <div class="station-list" id="station-list"></div>
  <button class="map-toggle-btn" id="map-toggle-btn" onclick="toggleMap()">Afficher la carte</button>
  <div id="map-wrapper">
    <div id="map"></div>
  </div>
</div>

<footer>
  <p>Données : prix-carburants.gouv.fr</p>
  <p id="update-info"></p>
</footer>

<script>
// ─── State ───
let userLat = null, userLon = null;
let map = null, userMarker = null;
let stationMarkers = [];
let stations = [];
let stationNames = {};
let mapVisible = false;

const API_BASE = 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records';
const STATIONS_NAME_URL = 'https://raw.githubusercontent.com/Aohzan/hass-prixcarburant/master/custom_components/prix_carburant/stations_name.json';

// ─── Load station names ───
fetch(STATIONS_NAME_URL)
  .then(r => r.json())
  .then(data => { stationNames = data; })
  .catch(() => { console.warn('Impossible de charger les noms de stations'); });

const FUEL_LABELS = {
  gazole: 'Gazole', sp95: 'SP95', sp98: 'SP98',
  e10: 'E10', e85: 'E85', gplc: 'GPLc'
};

// ─── Brand logos ───
const BRAND_LOGOS = {
  'totalenergies': 'https://logo.clearbit.com/totalenergies.com',
  'total': 'https://logo.clearbit.com/totalenergies.com',
  'total access': 'https://logo.clearbit.com/totalenergies.com',
  'shell': 'https://logo.clearbit.com/shell.com',
  'esso': 'https://logo.clearbit.com/esso.fr',
  'esso express': 'https://logo.clearbit.com/esso.fr',
  'bp': 'https://logo.clearbit.com/bp.com',
  'avia': 'https://logo.clearbit.com/avia-france.fr',
  'intermarché': 'https://logo.clearbit.com/intermarche.com',
  'intermarche': 'https://logo.clearbit.com/intermarche.com',
  'leclerc': 'https://logo.clearbit.com/e.leclerc',
  'e.leclerc': 'https://logo.clearbit.com/e.leclerc',
  'carrefour': 'https://logo.clearbit.com/carrefour.fr',
  'carrefour market': 'https://logo.clearbit.com/carrefour.fr',
  'carrefour contact': 'https://logo.clearbit.com/carrefour.fr',
  'carrefour express': 'https://logo.clearbit.com/carrefour.fr',
  'auchan': 'https://logo.clearbit.com/auchan.fr',
  'super u': 'https://logo.clearbit.com/magasins-u.com',
  'système u': 'https://logo.clearbit.com/magasins-u.com',
  'hyper u': 'https://logo.clearbit.com/magasins-u.com',
  'u express': 'https://logo.clearbit.com/magasins-u.com',
  'casino': 'https://logo.clearbit.com/groupe-casino.fr',
  'géant casino': 'https://logo.clearbit.com/groupe-casino.fr',
  'netto': 'https://logo.clearbit.com/netto.fr',
  'lidl': 'https://logo.clearbit.com/lidl.fr',
  'aldi': 'https://logo.clearbit.com/aldi.fr',
  'cora': 'https://logo.clearbit.com/cora.fr',
  'match': 'https://logo.clearbit.com/supermarchesmatch.fr',
  'elan': 'https://logo.clearbit.com/elan-fr.com',
  'dyneff': 'https://logo.clearbit.com/dyneff.fr',
  'vito': 'https://logo.clearbit.com/vito.lu',
  'simply market': 'https://logo.clearbit.com/auchan.fr',
  'monoprix': 'https://logo.clearbit.com/monoprix.fr',
  'colruyt': 'https://logo.clearbit.com/colruyt.fr',
  'spar': 'https://logo.clearbit.com/spar.fr',
  'huit à huit': 'https://logo.clearbit.com/carrefour.fr',
  '8 à huit': 'https://logo.clearbit.com/carrefour.fr',
  'g20': 'https://logo.clearbit.com/g20.fr',
  'atac': 'https://logo.clearbit.com/auchan.fr',
  'bi1': 'https://logo.clearbit.com/bi1.fr',
  'agip': 'https://logo.clearbit.com/eni.com',
  'eni': 'https://logo.clearbit.com/eni.com',
};

// ─── Geolocation ───
function startLocate() {
  const btn = document.getElementById('locate-btn');
  btn.textContent = 'Localisation en cours…';
  btn.disabled = true;

  if (!navigator.geolocation) {
    showStatus('Géolocalisation non supportée par ce navigateur', true);
    btn.textContent = 'Me géolocaliser';
    btn.disabled = false;
    return;
  }

  function onPositionSuccess(pos) {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('filter-bar').style.display = 'block';
    document.getElementById('results-container').style.display = 'block';
    fetchStations();
  }

  function onPositionError(err) {
    showStatus('Impossible de vous géolocaliser : ' + err.message, true);
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg> Réessayer';
    btn.disabled = false;
  }

  function ipFallback() {
    fetch('https://get.geojs.io/v1/ip/geo.json')
      .then(r => r.json())
      .then(data => {
        if (data.latitude && data.longitude) {
          onPositionSuccess({ coords: { latitude: parseFloat(data.latitude), longitude: parseFloat(data.longitude) } });
        } else {
          onPositionError({ message: 'Localisation par IP indisponible' });
        }
      })
      .catch(() => onPositionError({ message: 'Localisation par IP indisponible' }));
  }

  navigator.geolocation.getCurrentPosition(
    onPositionSuccess,
    () => {
      navigator.geolocation.getCurrentPosition(
        onPositionSuccess,
        () => ipFallback(),
        { enableHighAccuracy: false, timeout: 15000 }
      );
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ─── Map ───
function initMap() {
  if (map) { map.setView([userLat, userLon], 13); return; }
  map = L.map('map', { zoomControl: false }).setView([userLat, userLon], 13);
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OSM © CARTO',
    maxZoom: 19
  }).addTo(map);

  const userIcon = L.divIcon({
    className: '',
    html: '<div style="width:16px;height:16px;background:#4285f4;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(66,133,244,.5);"></div>',
    iconSize: [16, 16], iconAnchor: [8, 8]
  });
  userMarker = L.marker([userLat, userLon], { icon: userIcon }).addTo(map)
    .bindPopup('<strong>Vous êtes ici</strong>');
}

function toggleMap() {
  const wrapper = document.getElementById('map-wrapper');
  const btn = document.getElementById('map-toggle-btn');
  mapVisible = !mapVisible;

  if (mapVisible) {
    wrapper.style.display = 'block';
    btn.textContent = 'Masquer la carte';
    initMap();
    const fuel = document.getElementById('fuel-select').value;
    renderMapMarkers(fuel);
    setTimeout(() => map.invalidateSize(), 100);
  } else {
    wrapper.style.display = 'none';
    btn.textContent = 'Afficher la carte';
  }
}

// ─── Fetch ───
async function fetchStations() {
  showStatus('<span class="spinner"></span> Recherche des stations…');
  const fuel = document.getElementById('fuel-select').value;
  const radius = document.getElementById('radius-select').value;

  const where = `distance(geom, geom'POINT(${userLon} ${userLat})', ${radius}km)`;
  const params = new URLSearchParams({
    where,
    limit: '50',
    order_by: `distance(geom, geom'POINT(${userLon} ${userLat})')`,
    select: `*, distance(geom, geom'POINT(${userLon} ${userLat})') as dist`
  });

  try {
    const resp = await fetch(`${API_BASE}?${params}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    stations = (data.results || []).filter(r => {
      const price = r[fuel + '_prix'];
      return price && price > 0;
    });

    if (stations.length === 0) {
      showStatus(`Aucune station trouvant du ${FUEL_LABELS[fuel]} dans un rayon de ${radius} km`, true);
      document.getElementById('hero').innerHTML = '';
      document.getElementById('station-list').innerHTML = '';
      return;
    }

    showStatus(`${stations.length} station${stations.length > 1 ? 's' : ''} trouvée${stations.length > 1 ? 's' : ''}`);
    renderStations(fuel);
    if (mapVisible) renderMapMarkers(fuel);
  } catch (e) {
    console.error(e);
    showStatus('Erreur lors du chargement : ' + e.message, true);
  }
}

// ─── Helpers ───
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function roadDistance(straightLine) {
  return straightLine * 1.35;
}

function formatPrice(p) {
  return p ? p.toFixed(3).replace('.', ',') : '—';
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 3600) return Math.round(diff / 60) + ' min';
  if (diff < 86400) return Math.round(diff / 3600) + ' h';
  return Math.round(diff / 86400) + ' j';
}

function showStatus(msg, isError) {
  const el = document.getElementById('status');
  el.style.display = 'block';
  el.className = 'status-bar' + (isError ? ' error' : '');
  el.innerHTML = msg;
}

function getStationName(s) {
  const info = stationNames[String(s.id)];
  if (info) return info.name || info.brand || s.ville || 'Station';
  return s.ville || 'Station';
}

function getStationBrand(s) {
  const info = stationNames[String(s.id)];
  return info ? (info.brand || info.name) : null;
}

function getStationLogo(s) {
  const brand = getStationBrand(s);
  if (!brand) return null;
  const key = brand.toLowerCase().trim();
  return BRAND_LOGOS[key] || null;
}

// ─── Compute station data ───
function computeStationData(s, fuel, conso) {
  const lat = (s.geom && s.geom.lat) || (s.latitude && s.latitude / 100000);
  const lon = (s.geom && s.geom.lon) || (s.longitude && s.longitude / 100000);
  const dist = lat && lon ? haversine(userLat, userLon, lat, lon) : (s.dist ? s.dist / 1000 : null);
  const road = dist ? roadDistance(dist) : null;
  const price = s[fuel + '_prix'];
  const tripCost = road && price ? (road * 2 * conso / 100 * price) : 0;
  const fullCost = price ? price * 40 + tripCost : Infinity;
  const addr = [s.adresse, s.cp, s.ville].filter(Boolean).join(', ');
  const navUrl = lat && lon ? `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}` : '#';

  return { lat, lon, dist, road, price, tripCost, fullCost, addr, navUrl };
}

// ─── Render ───
function renderStations(fuel) {
  const heroEl = document.getElementById('hero');
  const listEl = document.getElementById('station-list');
  const conso = parseFloat(document.getElementById('conso-input').value) || 6.5;

  // Compute data and sort by total cost
  const stationsData = stations.map(s => ({
    station: s,
    ...computeStationData(s, fuel, conso)
  }));
  stationsData.sort((a, b) => a.fullCost - b.fullCost);

  // Update footer with most recent update time
  const majDates = stations.map(s => s[fuel + '_maj']).filter(Boolean);
  if (majDates.length) {
    const most_recent = majDates.sort().reverse()[0];
    document.getElementById('update-info').textContent = 'Mis à jour : il y a ' + timeAgo(most_recent);
  }

  // Hero: best station
  const best = stationsData[0];
  if (best) {
    const s = best.station;
    const heroLogo = getStationLogo(s);
    heroEl.innerHTML = `
      <div class="hero-card">
        <div class="hero-label">Meilleur prix</div>
        <div class="hero-price">${formatPrice(best.price)} €/L</div>
        <div class="hero-station-row">
          ${heroLogo ? `<img class="station-logo" src="${heroLogo}" alt="" onerror="this.style.display='none'">` : ''}
          <div class="hero-station">${getStationName(s)}</div>
        </div>
        <div class="hero-meta">${best.road ? best.road.toFixed(1) + ' km' : '—'} · ${s.adresse || ''}</div>
        <div class="hero-cost">Plein 40L = ${best.fullCost < Infinity ? best.fullCost.toFixed(2).replace('.', ',') + ' €' : '—'}</div>
        <div class="hero-trip-cost">(dont ${best.tripCost ? best.tripCost.toFixed(2).replace('.', ',') : '0,00'} € de trajet)</div>
        <a class="hero-btn" href="${best.navUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
          Itinéraire
        </a>
      </div>`;
  }

  // List: remaining stations
  const rest = stationsData.slice(1);
  listEl.innerHTML = rest.map(d => {
    const s = d.station;
    const name = getStationBrand(s) || getStationName(s);
    const logo = getStationLogo(s);
    return `
      <a class="station-card" href="${d.navUrl}" target="_blank" rel="noopener">
        <div class="station-row-1">
          <span class="station-price">${formatPrice(d.price)} €/L</span>
          <span class="station-full-cost">Plein: ${d.fullCost < Infinity ? d.fullCost.toFixed(2).replace('.', ',') + ' €' : '—'}</span>
        </div>
        <div class="station-row-2">
          <div class="station-name-group">
            ${logo ? `<img class="station-logo-sm" src="${logo}" alt="" onerror="this.style.display='none'">` : ''}
            <span class="station-name">${name}</span>
          </div>
          <span class="station-distance">${d.road ? d.road.toFixed(1) + ' km' : '—'}</span>
        </div>
        <div class="station-address">${s.adresse || ''}</div>
      </a>`;
  }).join('');
}

function renderMapMarkers(fuel) {
  stationMarkers.forEach(m => map.removeLayer(m));
  stationMarkers = [];

  const conso = parseFloat(document.getElementById('conso-input').value) || 6.5;
  const stationsData = stations.map(s => ({
    station: s,
    ...computeStationData(s, fuel, conso)
  }));
  stationsData.sort((a, b) => a.fullCost - b.fullCost);

  const bestFullCost = stationsData.length ? stationsData[0].fullCost : Infinity;
  const bounds = [[userLat, userLon]];

  stationsData.forEach(d => {
    if (!d.lat || !d.lon) return;
    bounds.push([d.lat, d.lon]);

    const isBest = d.fullCost === bestFullCost;
    const color = isBest ? '#22c55e' : '#888';

    const icon = L.divIcon({
      className: 'price-tag',
      html: `<div style="
        display:inline-block;
        background:${color};
        color:${isBest ? '#000' : '#fff'};
        font-family:system-ui,sans-serif;
        font-size:11px;
        font-weight:700;
        padding:3px 7px;
        border-radius:6px;
        white-space:nowrap;
        box-shadow:0 2px 8px rgba(0,0,0,.4);
        border:2px solid ${isBest ? '#fff' : 'transparent'};
        transform:translate(-50%,-50%);
      ">${d.price ? d.price.toFixed(3) : '?'}€</div>`,
      iconSize: [0, 0]
    });

    const s = d.station;
    const marker = L.marker([d.lat, d.lon], { icon })
      .addTo(map)
      .bindPopup(`<strong>${getStationName(s)}</strong><br>${s.adresse || ''}<br><strong>${FUEL_LABELS[fuel]} : ${formatPrice(d.price)} €</strong>`);
    stationMarkers.push(marker);
  });

  if (bounds.length > 1) {
    map.fitBounds(bounds, { padding: [40, 40] });
  }
}

function flyTo(lat, lon) {
  if (map && lat && lon) map.flyTo([lat, lon], 15, { duration: 0.7 });
}

// ─── Persistence ───
function loadSettings() {
  const fuel = localStorage.getItem('pomprix_fuel');
  const radius = localStorage.getItem('pomprix_radius');
  const conso = localStorage.getItem('pomprix_conso');
  if (fuel) document.getElementById('fuel-select').value = fuel;
  if (radius) document.getElementById('radius-select').value = radius;
  if (conso) document.getElementById('conso-input').value = conso;
}
function saveSetting(key, value) {
  localStorage.setItem('pomprix_' + key, value);
}
loadSettings();

// ─── Events ───
document.getElementById('fuel-select').addEventListener('change', () => {
  saveSetting('fuel', document.getElementById('fuel-select').value);
  fetchStations();
});
document.getElementById('radius-select').addEventListener('change', () => {
  saveSetting('radius', document.getElementById('radius-select').value);
  fetchStations();
});
document.getElementById('conso-input').addEventListener('change', () => {
  saveSetting('conso', document.getElementById('conso-input').value);
  if (stations.length) {
    const fuel = document.getElementById('fuel-select').value;
    renderStations(fuel);
    if (mapVisible) renderMapMarkers(fuel);
  }
});

// ─── Auto-locate if permission already granted ───
if (navigator.permissions) {
  navigator.permissions.query({ name: 'geolocation' }).then(result => {
    if (result.state === 'granted') {
      startLocate();
    }
  }).catch(() => {});
}
</script>

</html>
